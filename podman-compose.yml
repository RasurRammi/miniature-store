services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: rami
      POSTGRES_PASSWORD: ramirami
      POSTGRES_DB: backend
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  vendure:
    build: ./backend-vendure
    environment:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: vendure
      DB_USERNAME: rami
      DB_PASSWORD: ramirami
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  storefront:
    build: ./storefront  # builds from your Nuxt project folder
    environment:
      NUXT_PUBLIC_MEDUSA_URL: http://backend:9000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
